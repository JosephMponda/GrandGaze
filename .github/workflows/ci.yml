name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_grandgaze
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pip-audit
        run: pip-audit --strict --ignore-vuln PYSEC-2024-XXX

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.test_settings
          DATABASE_URL: postgres://test:test@localhost:5432/test_grandgaze
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-key-not-for-production
        run: python -m pytest -q --tb=short
