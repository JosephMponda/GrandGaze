{% extends "base.html" %}
{% block title %}Record Dialysis Session{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto py-6">
    <div class="flex items-center justify-between mb-8 border-b border-gray-200 pb-5">
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-ink-900">Record Dialysis Session</h1>
            <p class="text-sm text-ink-500 mt-2">{{ prescription.patient.full_name }}</p>
        </div>
        <a href="{% url 'patients:profile' prescription.patient.pk %}" class="btn-secondary text-sm font-semibold flex items-center gap-2 hover:-translate-y-0.5 transition-all duration-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back to Patient
        </a>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div class="bg-white border border-gray-200/60 rounded-2xl shadow-sm p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-ink-700 uppercase tracking-wider mb-1">Pre-dialysis Weight (kg)</label>
                    <input type="number" name="pre_weight_kg" step="0.1" required
                           class="w-full rounded-lg border-gray-200 text-sm focus:border-brand focus:ring-brand">
                </div>
                <div>
                    <label class="block text-xs font-bold text-ink-700 uppercase tracking-wider mb-1">Post-dialysis Weight (kg)</label>
                    <input type="number" name="post_weight_kg" step="0.1" required
                           class="w-full rounded-lg border-gray-200 text-sm focus:border-brand focus:ring-brand">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-ink-700 uppercase tracking-wider mb-1">Complications</label>
                <textarea name="complications" rows="2" class="w-full rounded-lg border-gray-200 text-sm focus:border-brand focus:ring-brand" placeholder="e.g. hypotension, cramping"></textarea>
            </div>
            <div>
                <label class="block text-xs font-bold text-ink-700 uppercase tracking-wider mb-1">Notes</label>
                <textarea name="notes" rows="2" class="w-full rounded-lg border-gray-200 text-sm focus:border-brand focus:ring-brand"></textarea>
            </div>
        </div>

        <div class="flex items-center justify-end gap-4">
            <a href="{% url 'patients:profile' prescription.patient.pk %}" class="btn-secondary text-sm">Cancel</a>
            <button type="submit" class="btn-primary text-sm">Record Session</button>
        </div>
    </form>
</div>
{% endblock %}
