{% extends "base.html" %}
{% block title %}Create Referral - {{ patient.patient_number }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
    <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center">
        <a href="{% url 'patients:profile' patient.pk %}" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 transition-colors" aria-label="Back">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        </a>
        <h1 class="text-2xl font-bold text-ink-900">Create Referral</h1>
    </div>
    <p class="text-sm text-ink-500 mb-4">{{ patient.full_name }} &middot; {{ patient.patient_number }}</p>

    <form method="post" class="bg-white border border-gray-200/60 rounded-2xl shadow-sm p-4 sm:p-6 space-y-4" data-offline-capable="true" data-form-type="referral">
        {% csrf_token %}
        <input type="hidden" name="patient_id" value="{{ patient.pk }}">
        <div>
            <label for="source" class="block text-sm font-semibold text-ink-900 mb-1">From Department</label>
            <input type="text" name="source" id="source" value="Ward" class="w-full rounded-lg border border-gray-300 bg-white text-sm py-2 px-3 focus:border-brand focus:ring-2 focus:ring-brand/20">
        </div>
        <div>
            <label for="destination" class="block text-sm font-semibold text-ink-900 mb-1">To Department</label>
            <select name="destination" id="destination" required class="w-full rounded-lg border border-gray-300 bg-white text-sm py-2 px-3 focus:border-brand focus:ring-2 focus:ring-brand/20">
                {% for value, label in departments %}
                    <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="reason" class="block text-sm font-semibold text-ink-900 mb-1">Reason for Referral</label>
            <textarea name="reason" id="reason" rows="3" placeholder="Clinical reason for referral" class="w-full rounded-lg border border-gray-300 bg-white text-sm py-2 px-3 focus:border-brand focus:ring-2 focus:ring-brand/20 resize-y"></textarea>
        </div>
        <button type="submit" class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white font-semibold text-sm py-2.5 px-5 rounded-lg shadow-sm hover:shadow-md transition-all duration-200">
            Create Referral
        </button>
    </form>
</div>
{% endblock %}
