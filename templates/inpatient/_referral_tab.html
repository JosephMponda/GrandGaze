{% load static %}
<div class="space-y-4">
    <div class="flex items-center justify-between">
        <p class="text-sm font-bold text-ink-900">Referrals</p>
        <a href="{% url 'inpatient:create_referral' patient.pk %}" class="bg-green-600 hover:bg-green-700 text-white font-semibold text-xs py-1.5 px-3 rounded-lg shadow-sm transition-all">+ New Referral</a>
    </div>

    {% if referrals %}
        <div class="divide-y divide-gray-100 border border-gray-200/60 rounded-2xl overflow-hidden bg-white shadow-sm">
            {% for ref in referrals %}
                <div class="px-4 sm:px-6 py-4">
                    <div class="flex items-center justify-between mb-1">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-semibold text-ink-900">{{ ref.source }}</span>
                            <svg class="w-4 h-4 text-ink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                            <span class="text-sm font-semibold text-brand">{{ ref.destination }}</span>
                        </div>
                        <span class="text-xs text-ink-400">{{ ref.created_at|date:"d M Y H:i" }}</span>
                    </div>
                    {% if ref.reason %}
                        <p class="text-sm text-ink-600 mt-1">{{ ref.reason }}</p>
                    {% endif %}
                </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="bg-white border border-gray-200/60 rounded-2xl shadow-sm p-8 text-center">
            <p class="text-sm text-ink-500">No referrals recorded.</p>
        </div>
    {% endif %}
</div>
