<div class="space-y-6">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <h2 class="text-xl font-bold text-ink-900">Prescriptions</h2>
        <a href="{% url 'pharmacy:prescribe' patient.pk %}" class="btn-primary inline-flex w-full items-center justify-center py-2 px-4 text-sm font-semibold shadow-sm transition-all duration-200 hover:-translate-y-0.5 sm:w-auto">Prescribe Medication</a>
    </div>

    {% if prescriptions %}
        <div class="divide-y divide-gray-100 border border-gray-200/60 rounded-none overflow-hidden">
            {% for prescription in prescriptions %}
                <div class="flex flex-col gap-2 px-4 py-3 bg-white transition-colors duration-150 hover:bg-paper sm:flex-row sm:items-center sm:justify-between">
                    <div class="min-w-0">
                        <p class="text-sm font-semibold text-ink-900">{{ prescription.drug }} {{ prescription.dose }}</p>
                    </div>
                    <span class="inline-flex self-start items-center px-2.5 py-0.5 rounded-none text-xs font-medium
                        {% if prescription.status == 'prescribed' %}bg-yellow-100 text-yellow-800
                        {% elif prescription.status == 'approved' %}bg-blue-100 text-blue-800
                        {% elif prescription.status == 'dispensed' %}bg-green-100 text-green-800
                        {% else %}bg-gray-100 text-gray-800{% endif %}">
                        {{ prescription.get_status_display }}
                    </span>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="text-sm text-ink-500 bg-paper border border-gray-200/60 rounded-none px-4 py-3">No active prescriptions.</p>
    {% endif %}
</div>
