{# ── Vitals Capture Form & NEWS2 Calculator (Alpine.js) ──────────────── #}

<div class="bg-white border border-gray-200/80 rounded-2xl shadow-sm overflow-hidden"
     x-data="{
        rr: '',
        spo2: '',
        oxygen: 'no',
        sbp: '',
        dbp: '',
        hr: '',
        temp: '',
        loc: 'alert',
        
        // NEWS2 Calculator Logic
        get score() {
            let total = 0;
            
            // Respiratory Rate
            const rr = parseFloat(this.rr);
            if (!isNaN(rr)) {
                if (rr <= 8) total += 3;
                else if (rr >= 9 && rr <= 11) total += 1;
                else if (rr >= 12 && rr <= 20) total += 0;
                else if (rr >= 21 && rr <= 24) total += 2;
                else if (rr >= 25) total += 3;
            }
            
            // SpO2 Scale 1 (Standard)
            const spo2 = parseFloat(this.spo2);
            if (!isNaN(spo2)) {
                if (spo2 <= 91) total += 3;
                else if (spo2 >= 92 && spo2 <= 93) total += 2;
                else if (spo2 >= 94 && spo2 <= 95) total += 1;
                else if (spo2 >= 96) total += 0;
            }
            
            // Supplemental Oxygen
            if (this.oxygen === 'yes') total += 2;
            
            // Systolic Blood Pressure
            const sbp = parseFloat(this.sbp);
            if (!isNaN(sbp)) {
                if (sbp <= 90) total += 3;
                else if (sbp >= 91 && sbp <= 100) total += 2;
                else if (sbp >= 101 && sbp <= 110) total += 1;
                else if (sbp >= 111 && sbp <= 219) total += 0;
                else if (sbp >= 220) total += 3;
            }
            
            // Heart Rate
            const hr = parseFloat(this.hr);
            if (!isNaN(hr)) {
                if (hr <= 40) total += 3;
                else if (hr >= 41 && hr <= 50) total += 1;
                else if (hr >= 51 && hr <= 90) total += 0;
                else if (hr >= 91 && hr <= 110) total += 1;
                else if (hr >= 111 && hr <= 130) total += 2;
                else if (hr >= 131) total += 3;
            }
            
            // Temperature
            const temp = parseFloat(this.temp);
            if (!isNaN(temp)) {
                if (temp <= 35.0) total += 3;
                else if (temp >= 35.1 && temp <= 36.0) total += 1;
                else if (temp >= 36.1 && temp <= 38.0) total += 0;
                else if (temp >= 38.1 && temp <= 39.0) total += 1;
                else if (temp >= 39.1) total += 2;
            }
            
            // Level of Consciousness
            if (this.loc !== 'alert') total += 3;
            
            return total;
        },
        
        get riskLevel() {
            if (this.hasRedScore) return { label: 'High Clinical Risk', color: 'bg-red-600 text-white', dot: 'bg-white' };
            if (this.score >= 7) return { label: 'High Clinical Risk', color: 'bg-red-600 text-white', dot: 'bg-white' };
            if (this.score >= 5) return { label: 'Medium Clinical Risk', color: 'bg-amber-500 text-white', dot: 'bg-white' };
            if (this.score >= 1) return { label: 'Low Clinical Risk', color: 'bg-green-500 text-white', dot: 'bg-white' };
            return { label: 'Normal', color: 'bg-gray-100 text-gray-700', dot: 'bg-green-500' };
        },

        // Any single parameter scoring 3 instantly escalates risk
        get hasRedScore() {
            const rr = parseFloat(this.rr);
            if (!isNaN(rr) && (rr <= 8 || rr >= 25)) return true;
            
            const spo2 = parseFloat(this.spo2);
            if (!isNaN(spo2) && spo2 <= 91) return true;
            
            const sbp = parseFloat(this.sbp);
            if (!isNaN(sbp) && (sbp <= 90 || sbp >= 220)) return true;
            
            const hr = parseFloat(this.hr);
            if (!isNaN(hr) && (hr <= 40 || hr >= 131)) return true;
            
            const temp = parseFloat(this.temp);
            if (!isNaN(temp) && temp <= 35.0) return true;
            
            if (this.loc !== 'alert') return true;
            
            return false;
        },

        get isReady() {
            // Basic validation to see if the main fields are filled
            return this.rr !== '' && this.spo2 !== '' && this.sbp !== '' && this.hr !== '' && this.temp !== '';
        }
    }">

    {# Header #}
    <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            </div>
            <div>
                <h3 class="text-base font-bold text-gray-900 leading-tight">Vitals & NEWS2</h3>
                <p class="text-xs text-gray-500">Record baseline parameters</p>
            </div>
        </div>

        {# Live Score Badge #}
        <div x-show="isReady" style="display: none;" 
             x-transition
             :class="riskLevel.color" 
             class="px-4 py-2 rounded-lg font-bold text-sm shadow-inner flex items-center gap-2 transition-colors duration-300">
            <span :class="riskLevel.dot" class="w-2 h-2 rounded-full animate-pulse"></span>
            <span x-text="'NEWS2 Score: ' + score"></span>
            <span class="opacity-70 mx-1">|</span>
            <span x-text="riskLevel.label" class="font-medium text-xs uppercase tracking-wider"></span>
        </div>
    </div>

    {# Form #}
    <form class="p-6" data-offline-capable="true" data-form-type="vitals">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            {# Respiratory #}
            <div class="space-y-4 col-span-1 md:col-span-2 lg:col-span-1 bg-gray-50/50 p-4 rounded-xl border border-gray-100">
                <h4 class="text-sm font-bold text-gray-900 border-b border-gray-200 pb-2">Respiratory</h4>
                
                <div>
                    <label for="id_rr" class="block text-sm font-medium text-gray-700 mb-1">Respiration Rate <span class="text-gray-400 font-normal">(bpm)</span></label>
                    <input id="id_rr" type="number" x-model="rr" step="1" class="w-full form-input rounded-lg border-gray-300 focus:ring-brand focus:border-brand sm:text-sm">
                </div>
                
                <div>
                    <label for="id_spo2" class="block text-sm font-medium text-gray-700 mb-1">SpO2 <span class="text-gray-400 font-normal">(%)</span></label>
                    <input id="id_spo2" type="number" x-model="spo2" step="1" max="100" class="w-full form-input rounded-lg border-gray-300 focus:ring-brand focus:border-brand sm:text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Supplemental Oxygen?</label>
                    <div class="flex gap-4">
                        <label for="oxygen_no" class="flex items-center gap-2 cursor-pointer">
                            <input id="oxygen_no" type="radio" x-model="oxygen" value="no" name="oxygen_radio" class="text-brand focus:ring-brand">
                            <span class="text-sm text-gray-700 font-medium">Room Air</span>
                        </label>
                        <label for="oxygen_yes" class="flex items-center gap-2 cursor-pointer">
                            <input id="oxygen_yes" type="radio" x-model="oxygen" value="yes" name="oxygen_radio" class="text-brand focus:ring-brand">
                            <span class="text-sm text-gray-700 font-medium">On Oxygen</span>
                        </label>
                    </div>
                </div>
            </div>

            {# Cardiovascular #}
            <div class="space-y-4 col-span-1 bg-gray-50/50 p-4 rounded-xl border border-gray-100">
                <h4 class="text-sm font-bold text-gray-900 border-b border-gray-200 pb-2">Cardiovascular</h4>
                
                <div>
                    <label for="id_hr" class="block text-sm font-medium text-gray-700 mb-1">Heart Rate <span class="text-gray-400 font-normal">(bpm)</span></label>
                    <input id="id_hr" type="number" x-model="hr" step="1" class="w-full form-input rounded-lg border-gray-300 focus:ring-brand focus:border-brand sm:text-sm">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label for="id_sbp" class="block text-sm font-medium text-gray-700 mb-1">Systolic BP</label>
                        <input id="id_sbp" type="number" x-model="sbp" step="1" class="w-full form-input rounded-lg border-gray-300 focus:ring-brand focus:border-brand sm:text-sm" placeholder="120">
                    </div>
                    <div>
                        <label for="id_dbp" class="block text-sm font-medium text-gray-700 mb-1">Diastolic BP</label>
                        <input id="id_dbp" type="number" x-model="dbp" step="1" class="w-full form-input rounded-lg border-gray-300 focus:ring-brand focus:border-brand sm:text-sm" placeholder="80">
                    </div>
                </div>
            </div>

            {# Other / Neurological #}
            <div class="space-y-4 col-span-1 bg-gray-50/50 p-4 rounded-xl border border-gray-100">
                <h4 class="text-sm font-bold text-gray-900 border-b border-gray-200 pb-2">Other</h4>
                
                <div>
                    <label for="id_temp" class="block text-sm font-medium text-gray-700 mb-1">Temperature <span class="text-gray-400 font-normal">(°C)</span></label>
                    <input id="id_temp" type="number" x-model="temp" step="0.1" class="w-full form-input rounded-lg border-gray-300 focus:ring-brand focus:border-brand sm:text-sm">
                </div>

                <div>
                    <label for="id_loc" class="block text-sm font-medium text-gray-700 mb-1">Level of Consciousness</label>
                    <select id="id_loc" x-model="loc" class="w-full form-select rounded-lg border-gray-300 focus:ring-brand focus:border-brand sm:text-sm text-gray-700 bg-white">
                        <option value="alert">Alert (A)</option>
                        <option value="cvpu">Confusion (C) / Voice (V) / Pain (P) / Unresponsive (U)</option>
                    </select>
                </div>
            </div>

        </div>

        <div class="mt-8 flex justify-end gap-3 pt-5 border-t border-gray-100">
            <button type="button" class="btn-secondary">Clear</button>
            <button type="submit" class="btn-primary" :disabled="!isReady" :class="{ 'opacity-50 cursor-not-allowed': !isReady }">
                Save Vitals
            </button>
        </div>
    </form>
</div>
