<!-- _order_form.html: Lab and Imaging Order Form -->
<div class="bg-white rounded-lg shadow-sm border border-slate-200">
    <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 rounded-t-lg">
        <h3 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
            </svg>
            Order Investigations
        </h3>
    </div>
    
    <div class="p-6">
        <form hx-post="/labs/order/" hx-swap="outerHTML" hx-indicator="#order-spinner">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <!-- Laboratory Tests -->
                <div class="space-y-4 border border-slate-200 rounded-md p-4 bg-slate-50">
                    <h4 class="font-medium text-slate-700 pb-2 border-b border-slate-200">Laboratory Tests</h4>
                    
                    <div class="space-y-2">
                        <label class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded cursor-pointer transition-colors">
                            <input type="checkbox" name="lab_test" value="fbc" class="w-4 h-4 text-teal-600 border-slate-300 rounded focus:ring-teal-500">
                            <span class="text-slate-700 text-sm">Full Blood Count (FBC)</span>
                        </label>
                        
                        <label class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded cursor-pointer transition-colors">
                            <input type="checkbox" name="lab_test" value="malaria_rdt" class="w-4 h-4 text-teal-600 border-slate-300 rounded focus:ring-teal-500">
                            <span class="text-slate-700 text-sm">Malaria RDT</span>
                        </label>
                        
                        <label class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded cursor-pointer transition-colors">
                            <input type="checkbox" name="lab_test" value="hiv_rapid" class="w-4 h-4 text-teal-600 border-slate-300 rounded focus:ring-teal-500">
                            <span class="text-slate-700 text-sm">HIV Rapid Test</span>
                        </label>
                        
                        <label class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded cursor-pointer transition-colors">
                            <input type="checkbox" name="lab_test" value="urinalysis" class="w-4 h-4 text-teal-600 border-slate-300 rounded focus:ring-teal-500">
                            <span class="text-slate-700 text-sm">Urinalysis</span>
                        </label>
                    </div>
                </div>

                <!-- Imaging Studies -->
                <div class="space-y-4 border border-slate-200 rounded-md p-4 bg-slate-50">
                    <h4 class="font-medium text-slate-700 pb-2 border-b border-slate-200">Imaging Studies</h4>
                    
                    <div class="space-y-2">
                        <label class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded cursor-pointer transition-colors">
                            <input type="checkbox" name="imaging_study" value="cxr" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                            <span class="text-slate-700 text-sm">Chest X-Ray (CXR)</span>
                        </label>
                        
                        <label class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded cursor-pointer transition-colors">
                            <input type="checkbox" name="imaging_study" value="ultrasound_abd" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                            <span class="text-slate-700 text-sm">Ultrasound Abdomen</span>
                        </label>
                        
                        <label class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded cursor-pointer transition-colors">
                            <input type="checkbox" name="imaging_study" value="ultrasound_obs" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                            <span class="text-slate-700 text-sm">Ultrasound Obstetric</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Clinical Details -->
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Clinical Indication <span class="text-red-500">*</span></label>
                    <textarea name="clinical_indication" rows="2" class="w-full rounded-md border-slate-300 shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm" placeholder="Brief history and reason for request..." required></textarea>
                </div>
                
                <div class="flex items-center gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Priority</label>
                        <select name="priority" class="rounded-md border-slate-300 shadow-sm focus:border-teal-500 focus:ring-teal-500 sm:text-sm">
                            <option value="routine">Routine</option>
                            <option value="urgent">Urgent</option>
                            <option value="stat" class="text-red-600 font-semibold">STAT (Emergency)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex justify-end pt-4 border-t border-slate-200">
                <button type="button" class="mr-3 px-4 py-2 border border-slate-300 shadow-sm text-sm font-medium rounded-md text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-colors">
                    Cancel
                </button>
                <button type="submit" class="inline-flex items-center justify-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-colors">
                    <span id="order-spinner" class="htmx-indicator mr-2">
                        <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                    Sign & Order Tests
                </button>
            </div>
        </form>
    </div>
</div>
