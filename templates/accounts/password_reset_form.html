{% extends "base.html" %}
{% block title %}Reset Password - MUST EMR{% endblock %}
{% block content %}
<div class="flex flex-col justify-center items-center py-4 px-4 sm:px-6 lg:px-8 mt-10">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold tracking-tight text-ink-900">Reset your password</h2>
            <p class="mt-2 text-sm text-ink-500">Enter your email address and we'll send you a reset link.</p>
        </div>
        <div class="bg-white border border-gray-200/60 rounded-2xl shadow-xl shadow-ink/5 p-8 sm:p-10">
            <form method="post" class="space-y-5">
                {% csrf_token %}
                {% include "components/_field.html" with field=form.email %}
                <button type="submit" class="w-full btn-primary py-3 text-sm font-semibold">Send Reset Link</button>
            </form>
            <p class="mt-4 text-center text-sm text-ink-500">
                <a href="{% url 'accounts:login' %}" class="text-brand hover:text-brand-dark">Back to sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
