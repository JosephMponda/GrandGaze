{% extends "base.html" %}
{% block title %}Email Sent - MUST EMR{% endblock %}
{% block content %}
<div class="flex flex-col justify-center items-center py-4 px-4 sm:px-6 lg:px-8 mt-10">
    <div class="max-w-md w-full text-center">
        <div class="bg-white border border-gray-200/60 rounded-none shadow-xl shadow-ink/5 p-8 sm:p-10">
            <svg class="mx-auto h-12 w-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <h2 class="mt-4 text-xl font-bold text-ink-900">Check your email</h2>
            <p class="mt-2 text-sm text-ink-500">If an account with that email exists, we've sent a password reset link.</p>
            <p class="mt-6"><a href="{% url 'accounts:login' %}" class="text-sm font-semibold text-brand hover:text-brand-dark">Back to sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
