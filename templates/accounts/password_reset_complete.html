{% extends "base.html" %}
{% block title %}Password Reset - MUST EMR{% endblock %}
{% block content %}
<div class="flex flex-col justify-center items-center py-4 px-4 sm:px-6 lg:px-8 mt-10">
    <div class="max-w-md w-full text-center">
        <div class="bg-white border border-gray-200/60 rounded-none shadow-xl shadow-ink/5 p-8 sm:p-10">
            <svg class="mx-auto h-12 w-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <h2 class="mt-4 text-xl font-bold text-ink-900">Password changed</h2>
            <p class="mt-2 text-sm text-ink-500">Your password has been set successfully.</p>
            <p class="mt-6"><a href="{% url 'accounts:login' %}" class="text-sm font-semibold text-brand hover:text-brand-dark">Sign in with your new password</a></p>
        </div>
    </div>
</div>
{% endblock %}
