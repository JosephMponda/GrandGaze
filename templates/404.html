{% extends "base.html" %}
{% block title %}Page Not Found — MUST EMR{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center py-20 px-4">
    <div class="text-7xl font-bold text-gray-200 mb-4">404</div>
    <h1 class="text-2xl font-bold text-ink-900 mb-2">Page not found</h1>
    <p class="text-ink-500 mb-8 text-center max-w-md">The page you’re looking for doesn’t exist or has been moved. Check the address or head back to your dashboard.</p>
    <a href="{% url 'accounts:dashboard' %}" class="btn-primary px-6 py-2.5 text-sm font-semibold">Go to Dashboard</a>
</div>
{% endblock %}
