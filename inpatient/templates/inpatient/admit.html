{% extends "base.html" %}
{% block title %}Admit Patient{% endblock %}
{% block content %}
{% block nav %}{% endblock %}
<div class="max-w-2xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
    <!-- Responsive Header -->
    <div class="border-b border-gray-200 pb-5 mb-8">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <!-- Left: Title -->
            <div class="min-w-0 flex-1">
                <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-ink-900 truncate">Admit Patient</h1>
                <p class="text-sm text-ink-500 mt-2 truncate">{{ patient.full_name }} &middot; {{ patient.patient_number }}</p>
            </div>
            
            <!-- Right: Back button -->
            <div class="flex-shrink-0">
                <a href="{% url 'patients:profile' patient.pk %}#inpatient" 
                   class="btn-secondary text-sm font-semibold flex items-center gap-2 hover:-translate-y-0.5 transition-all duration-200 w-full sm:w-auto justify-center">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    Back to Patient
                </a>
            </div>
        </div>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        <!-- Form Card -->
        <div class="bg-white border border-gray-200/60 rounded-none shadow-sm p-6 sm:p-8 space-y-6">
            <!-- Admission Diagnosis -->
            <div>
                <label class="block text-xs font-bold text-ink-700 uppercase tracking-wider mb-1.5">
                    Admission Diagnosis
                </label>
                <input type="text" name="diagnosis" required
                       class="w-full rounded-none border border-gray-300 bg-white text-sm py-2.5 px-3.5 focus:border-brand focus:ring-2 focus:ring-brand/20 transition-colors"
                       placeholder="e.g. Severe malaria, Pneumonia">
            </div>
            
            <!-- Ward Selection -->
            <div>
                <label class="block text-xs font-bold text-ink-700 uppercase tracking-wider mb-1.5">
                    Ward
                </label>
                <select name="ward" 
                        class="w-full rounded-none border border-gray-300 bg-white text-sm py-2.5 px-3.5 focus:border-brand focus:ring-2 focus:ring-brand/20 transition-colors"
                        hx-get="/inpatient/beds-for-ward/" 
                        hx-target="#bed-select" 
                        hx-trigger="change">
                    <option value="">- Select ward -</option>
                    {% for ward in wards %}
                        <option value="{{ ward.pk }}">{{ ward.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <!-- Bed Selection -->
            <div id="bed-select">
                <label class="block text-xs font-bold text-ink-700 uppercase tracking-wider mb-1.5">
                    Bed (optional)
                </label>
                <select name="bed" 
                        class="w-full rounded-none border border-gray-300 bg-white text-sm py-2.5 px-3.5 focus:border-brand focus:ring-2 focus:ring-brand/20 transition-colors">
                    <option value="">- Assign later -</option>
                </select>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-end gap-3 sm:gap-4 pt-2">
            <a href="{% url 'patients:profile' patient.pk %}#inpatient" 
               class="btn-secondary text-sm font-semibold py-3 px-6 hover:-translate-y-0.5 transition-all duration-200 text-center order-2 sm:order-1">
                Cancel
            </a>
            <button type="submit" 
                    class="btn-primary text-sm font-semibold py-3 px-8 shadow-md shadow-brand/20 hover:shadow-lg hover:shadow-brand/30 hover:-translate-y-0.5 transition-all duration-200 order-1 sm:order-2">
                Admit Patient
            </button>
        </div>
    </form>
</div>
{% endblock %}
