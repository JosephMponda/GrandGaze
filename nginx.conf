# MUST-GSL EMR - Nginx reverse proxy for local Docker fallback
# AGENTS.md §2: plain HTTP only (not traversing a public network).
# For production deployments, terminate TLS at a load balancer.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security headers (relaxed for local-only demo use)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Rate limiting for login (complements django-axes server-side)
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    upstream django {
        server web:8000;
    }

    server {
        listen 80 default_server;
        server_name _;
        client_max_body_size 10M;

        # Serve collected static files directly
        location /static/ {
            alias /static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Health check - pass through without buffering
        location /health/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # Login rate limiting
        location /accounts/login/ {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else
        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }
}
